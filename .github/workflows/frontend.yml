name: Extension CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'privacy-guardian/**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: privacy-guardian

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Use Node (not Bun)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Clean install (faster + consistent)
      - name: Install dependencies
        run: npm ci

      # Optional but good hygiene
      - name: Lint
        run: npm run lint || true

      # Build extension (Vite)
      - name: Build extension
        run: npm run build

      # Critical: ensure manifest exists
      - name: Verify manifest
        run: |
          if [ ! -f dist/manifest.json ]; then
            echo "manifest.json missing in dist!"
            exit 1
          fi

      # Zip the extension
      - name: Package extension
        run: |
          cd dist
          zip -r ../extension.zip .

      # Upload artifact (for debugging/download)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: privacy-guardian/extension.zip

      # Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Extension Release v1.0.${{ github.run_number }}
          files: privacy-guardian/extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}